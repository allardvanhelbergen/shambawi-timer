<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shambawi Practice Timer</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body data-phase="welcome">
    <main class="app-shell">
      <section class="ceremony-view welcome-view" id="welcome-view" aria-labelledby="welcome-title">
        <div class="ceremony-content">
          <h1 id="welcome-title" tabindex="-1">Shambawi Mahamudra<br />Kriya</h1>
          <button class="ceremony-start-button" id="start-practice-button" type="button" aria-label="Start Shambawi Mahamudra Kriya">
            <span class="fa-icon fa-play" aria-hidden="true"></span>
          </button>
        </div>
        <div class="ceremony-scene" aria-hidden="true">
          <img class="ceremony-ripples" src="./assets/still-water-ripples.png" alt="" />
          <img class="ceremony-leaves" src="./assets/leaves-transparent.png" alt="" />
          <img class="ceremony-leaves ceremony-reflection" src="./assets/leaves-transparent.png" alt="" />
        </div>
      </section>

      <section class="timer-panel" id="practice-view" aria-label="Shambawi timer" hidden>
        <div class="main-grid">
          <aside class="rounds-panel" aria-label="Practice rounds">
            <ol class="round-list" id="round-list"></ol>
          </aside>

          <section class="focus-panel" aria-live="polite">
            <div class="timer-stage">
              <div class="toggles" role="group" aria-label="Sound settings">
                <label class="sound-toggle" title="Bell sounds">
                  <input id="bell-toggle" type="checkbox" aria-label="Bell sounds" checked />
                  <span class="fa-icon sound-icon sound-icon-on fa-bell" aria-hidden="true"></span>
                  <span class="fa-icon sound-icon sound-icon-off fa-bell-slash" aria-hidden="true"></span>
                </label>
                <label class="sound-toggle" title="Voice announcements">
                  <input id="voice-toggle" type="checkbox" aria-label="Voice announcements" checked />
                  <span class="fa-icon sound-icon sound-icon-on fa-comment" aria-hidden="true"></span>
                  <span class="fa-icon sound-icon sound-icon-off fa-comment-slash" aria-hidden="true"></span>
                </label>
              </div>

              <div class="timer-ring" id="timer-ring">
                <div class="timer-core">
                  <h2 id="current-title" tabindex="-1">Butterfly</h2>
                  <p class="time-readout" id="time-readout">2:00</p>
                  <p class="count-readout" id="count-readout"></p>
                </div>
              </div>
            </div>

            <div class="session-progress-block">
              <div class="session-progress-meta">
                <p class="session-elapsed" id="session-elapsed" aria-label="Elapsed session time">0:00</p>
                <p class="session-total" id="session-meta" aria-label="Total session time">32:38</p>
              </div>
              <div class="progress-track" aria-label="Session progress">
                <span id="session-progress"></span>
              </div>
            </div>

            <div class="controls" aria-label="Timer controls">
              <button class="icon-button" id="previous-button" type="button" title="Previous round" aria-label="Previous round">
                <span class="fa-icon fa-backward-step" aria-hidden="true"></span>
              </button>
              <button class="icon-button primary" id="play-button" type="button" title="Start" aria-label="Start">
                <span class="fa-icon fa-play" id="play-icon" aria-hidden="true"></span>
              </button>
              <button class="icon-button" id="next-button" type="button" title="Next round" aria-label="Next round">
                <span class="fa-icon fa-forward-step" aria-hidden="true"></span>
              </button>
              <button class="icon-button" id="reset-button" type="button" title="Reset" aria-label="Reset">
                <span class="fa-icon fa-rotate-left" aria-hidden="true"></span>
              </button>
            </div>
          </section>
        </div>
      </section>

      <section class="ceremony-view completed-view" id="completed-view" aria-labelledby="completed-title" hidden>
        <div class="ceremony-content">
          <h1 id="completed-title" tabindex="-1">Shambawi completed</h1>
          <button class="practice-again-button" id="practice-again-button" type="button">
            <span class="fa-icon fa-rotate-left" aria-hidden="true"></span>
            Practice again
          </button>
        </div>
        <div class="ceremony-scene" aria-hidden="true">
          <img class="ceremony-ripples" src="./assets/still-water-ripples.png" alt="" />
          <img class="ceremony-leaves" src="./assets/leaves-transparent.png" alt="" />
          <img class="ceremony-leaves ceremony-reflection" src="./assets/leaves-transparent.png" alt="" />
        </div>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
