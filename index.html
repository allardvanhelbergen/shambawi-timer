<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shambawi Practice Timer</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="timer-panel" aria-labelledby="app-title">
        <header class="topbar">
          <div>
            <h1 id="app-title">Shambawi timer</h1>
            <p class="session-meta" id="session-meta">Structured practice</p>
          </div>
          <div class="toggles" aria-label="Sound settings">
            <label class="toggle">
              <input id="bell-toggle" type="checkbox" checked />
              <span>Bell</span>
            </label>
            <label class="toggle">
              <input id="voice-toggle" type="checkbox" checked />
              <span>Voice</span>
            </label>
          </div>
        </header>

        <div class="main-grid">
          <aside class="rounds-panel" aria-labelledby="rounds-title">
            <h2 id="rounds-title">Rounds</h2>
            <ol class="round-list" id="round-list"></ol>
          </aside>

          <section class="focus-panel" aria-live="polite">
            <div class="announcement-strip" id="announcement-strip">
              Ready to begin
            </div>

            <div class="timer-ring" id="timer-ring">
              <div class="timer-core">
                <span class="round-kicker" id="round-kicker">Round 1</span>
                <h2 id="current-title">Butterfly</h2>
                <p class="time-readout" id="time-readout">2:00</p>
                <p class="count-readout" id="count-readout">Timed round</p>
              </div>
            </div>

            <div class="next-row">
              <span>Next</span>
              <strong id="next-round">Rock the baby</strong>
            </div>

            <div class="progress-track" aria-label="Session progress">
              <span id="session-progress"></span>
            </div>

            <div class="controls" aria-label="Timer controls">
              <button class="icon-button" id="previous-button" type="button" title="Previous round" aria-label="Previous round">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M19 20 9 12l10-8v16Z"></path>
                  <path d="M5 19V5"></path>
                </svg>
              </button>
              <button class="icon-button primary" id="play-button" type="button" title="Start" aria-label="Start">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path id="play-icon" d="M8 5v14l11-7L8 5Z"></path>
                </svg>
              </button>
              <button class="icon-button" id="next-button" type="button" title="Next round" aria-label="Next round">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m5 4 10 8-10 8V4Z"></path>
                  <path d="M19 5v14"></path>
                </svg>
              </button>
              <button class="icon-button" id="reset-button" type="button" title="Reset" aria-label="Reset">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 7v6h6"></path>
                  <path d="M5.6 17A8 8 0 1 0 6 6.4L4 7"></path>
                </svg>
              </button>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
